name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Kodlari Getir
        uses: actions/checkout@v4

      - name: Her Seyi Kur
        run: npm install

      - name: Tum Testleri Bul ve Calistir
        uses: cypress-io/github-action@v6
        with:
          install: false
          # Bu sefer dosya yolu belirtmiyoruz, GitHub kendisi bulacak!
