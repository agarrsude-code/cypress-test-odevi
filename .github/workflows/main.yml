name: Cypress Tests
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --no-package-lock # Lock dosyası yoksa zorla kur dedik

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          install: false # Kurulumu biz üstte yaptık, sen sadece çalıştır dedik
